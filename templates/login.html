{% extends "layout.html" %}

{% block titlePage %}
{{ titlePage }}
{% endblock titlePage %}

{% block body %}

<div class="container-md px-3 bg-dark h-100 text-center text-light">

    <h2>{{ title }}</h2>
  
    <div class="d-flex justify-content-center">
        
        <form action="/api/login" method="POST" class="w-50">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label for="exampleFormControlInput1" class="form-label">Username</label>
            <input type="text" class="form-control mb-3" id="exampleFormControlInput1" name="username" placeholder="Username">

            <label for="exampleFormControlInput1" class="form-label">Password</label>
            <input type="password" class="form-control mb-3" id="exampleFormControlInput1" name="password" placeholder="Password">
            
            <button type="submit" class="btn btn-primary mb-3" >Ingresar</button>
        </form>
    </div>
</div>

{% endblock body %}
