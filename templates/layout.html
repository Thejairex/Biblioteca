<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{% block titlePage %}{% endblock titlePage %}</title>
	<link rel="stylesheet" id="estilo" href="{{ url_for('static', filename='css/bootstrap.min.neon.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
	<nav class="navbar navbar-expand-md navbar-dark bg-dark container-md sticky-top">
		<div class="container-fluid">
		  <a class="navbar-brand text-light" href="/">Biblioteca</a>
		  
		  <button class="navbar-toggler " type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
			<span class="navbar-toggler-icon"></span>
		  </button>
		  <div class="collapse navbar-collapse d-flex flex-fill justify-content-center" id="navbarNav">
			<ul class="navbar-nav">
				<li class="nav-item"><a href="#" class="nav-link">Animes</a></li>
				<li class="nav-item"><a href="#" class="nav-link">Comics</a></li>
				<li class="nav-item"><a href="#" class="nav-link">Novelas</a></li>
			</ul>
			<div class="nav-item  d-flex flex-fill justify-content-end">
				{% block searchBox %}
				
				  {% endblock searchBox %}
			</div>
			<ul class="navbar-nav ">
				
				
				<div class="d-flex  justify-content-end">
					<li class="nav-item dropdown">
						<a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false" id="dropdown-main">
							{{ current_user.username }}
						</a>

						<ul class="dropdown-menu dropdown-menu-dark">
							<li class="dropdown-item dropstart">
								<a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="true">
									Temas
								</a>
								<ul class='dropdown-menu dropdown-menu-dark'>
									<li>
										<button class="dropdown-item btn" onclick="changeStyle(1)">Bootstrap Principal</button>
									</li>
									<li >
										<button class="dropdown-item btn" onclick="changeStyle(2)">Bootstrap Dark</button>
									</li>
									<li >
										<button class="dropdown-item btn" onclick="changeStyle(3)">Bootstrap Neon</button>
									</li>
									<li >
										<button class="dropdown-item btn" onclick="changeStyle(4)">Bootstrap Quart</button>
									</li>
								</ul>
							</li>
							{% if url_for(request.endpoint)  != '/login' %}
								<li>
									<a href="{{ url_for('logout') }} " class="nav-link">Cerrar Sesion</a>
								</li>
							{% endif %}
						</ul>
					</li>
					
				  
				</div>
				
			</ul>
		  </div>
		  
		</div>
	  </nav>

	{% block body %}
	{% endblock %}

	<script src="{{ url_for('static', filename='js/bootstrap.bundle.js') }}"></script>
	<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
